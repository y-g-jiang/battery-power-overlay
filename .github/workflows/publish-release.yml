name: Publish Release

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/publish-release.yml"
      - "BatteryInfoView/**"
      - "installer/**"
      - "battery_power_overlay.py"
      - "battery_power_overlay.spec"
      - "battery_power_overlay.exe"
      - "battery_power_overlay.json"
      - "README.md"
      - "NOTICE.md"
      - "RELEASE_NOTES.md"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install PyInstaller
        run: python -m pip install pyinstaller

      - name: Build overlay executable
        shell: pwsh
        run: python -m PyInstaller --clean --noconfirm .\battery_power_overlay.spec

      - name: Copy overlay executable
        shell: pwsh
        run: Copy-Item -LiteralPath .\dist\battery_power_overlay.exe -Destination .\battery_power_overlay.exe -Force

      - name: Build installer
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .\installer\build_installer.ps1 -Version v0.2.0

      - name: Create or update GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view v0.2.0 --repo $env:GITHUB_REPOSITORY *> $null
          $releaseExists = ($LASTEXITCODE -eq 0)
          if ($releaseExists) {
            gh release edit v0.2.0 --repo $env:GITHUB_REPOSITORY --title "Battery Power Overlay v0.2.0" --notes-file .\RELEASE_NOTES.md
            gh release upload v0.2.0 .\release\BatteryPowerOverlaySetup.exe --repo $env:GITHUB_REPOSITORY --clobber
          } else {
            gh release create v0.2.0 .\release\BatteryPowerOverlaySetup.exe --repo $env:GITHUB_REPOSITORY --target main --title "Battery Power Overlay v0.2.0" --notes-file .\RELEASE_NOTES.md
          }
